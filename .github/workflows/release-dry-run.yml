name: Release Dry Run

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to simulate (e.g. v0.1.0)'
        required: true

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'
      - name: Validate tag matches pyproject.toml version
        run: |
          TAG="${{ inputs.tag }}"
          TAG="${TAG#v}"
          PKG_VERSION=$(python3 -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "ERROR: input tag v${TAG} does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi
          echo "Version validated: $PKG_VERSION"
      - name: Build only (no publish)
        run: uv build
      - name: Verify artifacts
        run: |
          ls dist/*.whl dist/*.tar.gz
          sha256sum dist/*.whl dist/*.tar.gz
