#
# plugin-compat-gate.yml — CI gate: runtime version handshake tests
#
# DoD gate for OMN-8789 SD-02:
#   1. Runs version_handshake unit tests (match + mismatch detection).
#   2. Hard-fails if handshake module is broken or tests regress.
#
# When this fails:
#   - Test failure: fix omnimarket.runtime.version_handshake logic.
#   - Import error: check packaging dependency is present in pyproject.toml.

name: Plugin Compat Handshake Gate

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/omnimarket/runtime/**'
      - 'tests/test_plugin_compat_handshake.py'
      - '.github/workflows/plugin-compat-gate.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/omnimarket/runtime/**'
      - 'tests/test_plugin_compat_handshake.py'
      - '.github/workflows/plugin-compat-gate.yml'
  merge_group:
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'

jobs:
  plugin-compat-handshake:
    name: Runtime version handshake tests
    runs-on: >-
      ${{
        (vars.USE_SELF_HOSTED_RUNNERS == 'true' &&
         (github.event_name == 'push' ||
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'schedule'))
        && fromJSON('["self-hosted","omnibase-ci"]')
        || fromJSON('["ubuntu-latest"]')
      }}
    timeout-minutes: 10
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Clone omnibase_core
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_core.git ../omnibase_core

      - name: Clone omnibase_compat
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_compat.git ../omnibase_compat

      - name: Clone omnimemory
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnimemory.git ../omnimemory

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.1"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Load cached venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: uv-plugin-compat-handshake-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run version handshake tests
        run: |
          uv run pytest tests/test_plugin_compat_handshake.py -v \
            --tb=short \
            -p no:warnings

      - name: Verify handshake module imports cleanly
        run: |
          uv run python -c "
          from omnimarket.runtime.version_handshake import (
              check_plugin_compat,
              load_compat_matrix,
              ModelPluginCompatResult,
              ModelPluginCompatMatrix,
          )
          print('OK: version_handshake module imports clean')
          "
