# linear-close-on-merge.yml
#
# Auto-close Linear tickets when their associated PR merges.
#
# Fires on pull_request closed events. When the PR was actually merged
# (not just closed), extracts the OMN-XXXX ticket ID from the branch name
# and calls the Linear API to mark the ticket as Done.
#
# Branch name conventions supported:
#   jonahgabriel/omn-XXXX-description  (Linear default)
#   jonah/omn-XXXX-description          (short username variant)
#   epic/OMN-XXXX/OMN-YYYY/run-id       (epic-team branches, closes child OMN-YYYY)
#   OMN-XXXX-description                (bare prefix variant)
#
# Implements OMN-3262.

name: Close Linear Ticket on PR Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - develop

jobs:
  close-linear-ticket:
    name: Close Linear Ticket
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Extract ticket ID from branch name
        id: extract
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        shell: bash
        run: |
          echo "Branch: $BRANCH"

          TICKET_ID=""

          # Try to extract from epic branch: epic/OMN-XXXX/OMN-YYYY/...
          if printf '%s' "$BRANCH" | grep -qiE "^epic/OMN-[0-9]+/(OMN-[0-9]+)(/|$)"; then
            TICKET_ID=$(printf '%s' "$BRANCH" | grep -ioE "^epic/OMN-[0-9]+/(OMN-[0-9]+)(/|$)" | grep -ioE "OMN-[0-9]+" | tail -1)
          fi

          # Try standard branch: */omn-XXXX-* or */OMN-XXXX-*
          if [[ -z "$TICKET_ID" ]]; then
            TICKET_ID=$(printf '%s' "$BRANCH" | grep -ioE "(OMN|omn)-[0-9]+" | head -1 | tr '[:lower:]' '[:upper:]')
          fi

          if [[ -z "$TICKET_ID" ]]; then
            echo "No OMN-XXXX ticket ID found in branch '$BRANCH' — skipping."
            echo "ticket_id=" >> "$GITHUB_OUTPUT"
          else
            echo "Extracted ticket ID: $TICKET_ID"
            echo "ticket_id=$TICKET_ID" >> "$GITHUB_OUTPUT"
          fi

      - name: Close Linear ticket
        if: steps.extract.outputs.ticket_id != ''
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          TICKET_ID: ${{ steps.extract.outputs.ticket_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          if [ -z "$LINEAR_API_KEY" ]; then
            echo "LINEAR_API_KEY is not set — skipping Linear ticket close"
            exit 0
          fi

          # Validate LINEAR_API_KEY format (alphanumeric only)
          if ! printf '%s' "$LINEAR_API_KEY" | grep -qE '^[A-Za-z0-9_-]+$'; then
            echo "LINEAR_API_KEY appears malformed — skipping Linear ticket close"
            exit 0
          fi

          # Validate extracted IDs are safe for JSON interpolation
          if ! echo "$TICKET_ID" | grep -qE '^(OMN|omn)-[0-9]+$'; then
            echo "Invalid TICKET_ID format: $TICKET_ID — skipping"
            exit 0
          fi

          echo "Marking $TICKET_ID as Done (PR #$PR_NUMBER merged in $REPO)"

          SEARCH_RESPONSE=$(curl -s --max-time 30 -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"{ issue(id: \\\"$TICKET_ID\\\") { id identifier title state { name } } }\"}" \
            2>&1)

          echo "Linear API search: $(echo "$SEARCH_RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print('found' if d.get('data',{}).get('issue') else 'not found')" 2>/dev/null || echo "status-unknown")"

          ISSUE_ID=$(echo "$SEARCH_RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          issue = data.get('data', {}).get('issue')
          if issue:
              print(issue['id'])
          else:
              print('')
          " 2>/dev/null || echo "")

          if [ -z "$ISSUE_ID" ]; then
            echo "Could not extract issue ID from Linear response — skipping"
            exit 0
          fi

          if ! echo "$ISSUE_ID" | grep -qE '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'; then
            echo "ISSUE_ID is not a valid UUID: $ISSUE_ID — skipping"
            exit 0
          fi

          CURRENT_STATE=$(echo "$SEARCH_RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          issue = data.get('data', {}).get('issue')
          if issue:
              print(issue.get('state', {}).get('name', ''))
          else:
              print('')
          " 2>/dev/null || echo "")

          echo "Issue $TICKET_ID (ID: $ISSUE_ID) current state: $CURRENT_STATE"

          if echo "$CURRENT_STATE" | grep -qiE "^(done|cancelled|duplicate|completed|merged|released|shipped|closed)$"; then
            echo "$TICKET_ID is already in state '$CURRENT_STATE' — no update needed."
            exit 0
          fi

          TEAM_RESPONSE=$(curl -s --max-time 30 -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"{ issue(id: \\\"$TICKET_ID\\\") { team { id states { nodes { id name type } } } } }\"}" \
            2>&1)

          DONE_STATE_ID=$(echo "$TEAM_RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          states = (data.get('data', {})
                        .get('issue', {})
                        .get('team', {})
                        .get('states', {})
                        .get('nodes', []))
          completed = [s for s in states if s.get('type', '').upper() == 'COMPLETED']
          done = next((s for s in completed if s.get('name', '').lower() == 'done'), None)
          if done:
              print(done['id'])
          elif completed:
              print(sorted(completed, key=lambda s: s.get('name', ''))[0]['id'])
          " 2>/dev/null || echo "")

          if [ -z "$DONE_STATE_ID" ]; then
            echo "Could not find Done state ID for this team — skipping"
            exit 0
          fi

          if ! echo "$DONE_STATE_ID" | grep -qE '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'; then
            echo "DONE_STATE_ID is not a valid UUID: $DONE_STATE_ID — skipping"
            exit 0
          fi

          UPDATE_RESPONSE=$(curl -s --max-time 30 -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"mutation { issueUpdate(id: \\\"$ISSUE_ID\\\", input: { stateId: \\\"$DONE_STATE_ID\\\" }) { success issue { id state { name } } } }\"}" \
            2>&1)

          SUCCESS=$(echo "$UPDATE_RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          print(data.get('data', {}).get('issueUpdate', {}).get('success', False))
          " 2>/dev/null || echo "False")

          if [[ "$SUCCESS" == "True" ]]; then
            echo "Successfully marked $TICKET_ID as Done."
          else
            echo "WARNING: Failed to mark $TICKET_ID as Done."
            exit 0
          fi
