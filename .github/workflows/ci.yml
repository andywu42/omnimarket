name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone omnibase_core
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_core.git ../omnibase_core
      - name: Clone omnibase_compat
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_compat.git ../omnibase_compat
      - name: Clone omnimemory
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnimemory.git ../omnimemory
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Ruff check
        run: uv run ruff check src/ tests/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/
      - name: Stub implementation check
        run: python ../omnibase_core/scripts/validation/check_stub_implementations.py src/
      - name: TODO format check
        run: |
          pip install onex-change-control 2>/dev/null || pip install ../onex_change_control 2>/dev/null || true
          # Inline check: all TODO/FIXME/HACK must have (OMN-XXXX) ticket reference
          find src/ -name '*.py' -not -path '*/tests/*' | while read -r f; do
            grep -nE '#.*\b(TODO|FIXME|HACK)\b' "$f" 2>/dev/null | grep -vE '\b(TODO|FIXME|HACK)\(OMN-[0-9]+\)' | while read -r line; do
              echo "::error file=${f}::${line} -- bare TODO/FIXME/HACK without ticket reference (use: # TODO(OMN-XXXX): description)"
              echo "FAIL" > /tmp/todo_check_failed
            done
          done
          if [ -f /tmp/todo_check_failed ]; then exit 1; fi
      # NOTE: This step requires PR #75 (OMN-7922, fix legacy contracts) to be merged
      # before it is active in CI. The build_loop_orchestrator handler still contains
      # hardcoded onex.evt.* constants until OMN-7922 migrates them to contract-declared
      # topics. This lint was added in OMN-7921 (branched from PR #76 / OMN-7918).
      - name: Topic-literal guardrail
        run: python scripts/lint_no_hardcoded_topics.py
      - name: Reject node-level topics.py files
        run: |
          FOUND=$(find src/omnimarket/nodes -name "topics.py" -path "*/node_*/*" 2>/dev/null)
          if [ -n "$FOUND" ]; then
            echo "ERROR: topics.py files found in node directories. Topic bindings must come from contract.yaml."
            echo "$FOUND"
            exit 1
          fi
          echo "OK: No node-level topics.py files found."

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone omnibase_core
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_core.git ../omnibase_core
      - name: Clone omnibase_compat
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_compat.git ../omnibase_compat
      - name: Clone omnimemory
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnimemory.git ../omnimemory
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Mypy strict
        run: uv run mypy src/omnimarket/ --strict

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone omnibase_core
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_core.git ../omnibase_core
      - name: Clone omnibase_compat
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_compat.git ../omnibase_compat
      - name: Clone omnimemory
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnimemory.git ../omnimemory
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Pytest
        run: uv run pytest tests/ -v --tb=short -m "not kafka"

  topic-naming-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone omnibase_infra
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_infra.git ../omnibase_infra
      - name: Clone omnibase_core
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_core.git ../omnibase_core
      - name: Clone omnibase_compat
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_compat.git ../omnibase_compat
      - name: Clone omnimemory
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnimemory.git ../omnimemory
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Topic naming lint (OMN-8507)
        env:
          OMNIBASE_INFRA_PATH: ../omnibase_infra
        run: |
          uv run python ../omnibase_infra/scripts/validation/lint_topic_names.py \
            --scan-contracts src/omnimarket/nodes \
            --baseline scripts/validation/topic_naming_baseline.txt
          uv run python ../omnibase_infra/scripts/validation/lint_topic_names.py \
            --scan-python src/omnimarket \
            --baseline scripts/validation/topic_naming_baseline.txt

  # ============================================================================
  # RUNTIME SWEEP GATE (OMN-8611)
  # Verifies every onex.nodes entry point in pyproject.toml has a module
  # directory, __init__.py, and contract.yaml. Fails if any are broken.
  # NOTE: This gate must pass on main — land AFTER fix-market-entry-points
  # PR merges (the PR fixing 96 broken entry points).
  # ============================================================================
  runtime-sweep:
    name: Runtime Sweep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify entry point wiring
        run: python scripts/ci/run_runtime_sweep.py

  # ============================================================================
  # E2E WORKFLOW RUNNER (inmemory bus)
  # Proves the deterministic node platform works end-to-end on every PR:
  #   - onex run CLI loads a real workflow contract
  #   - RuntimeLocal starts EventBusInmemory, subscribes to terminal topic
  #   - Handler executes and runtime writes workflow_result.json
  #   - Exit code 0 = COMPLETED, evidence on disk
  # No Kafka, no Postgres, no .201 required.
  # ============================================================================

  e2e-workflow-runner:
    name: E2E Workflow Runner (inmemory bus)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Clone omnibase_core
        run: |
          OMNIBASE_CORE_SHA=$(git ls-remote https://github.com/OmniNode-ai/omnibase_core.git HEAD | cut -f1)
          git clone --depth=1 https://github.com/OmniNode-ai/omnibase_core.git ../omnibase_core
          echo "omnibase_core pinned to: $OMNIBASE_CORE_SHA"
      - name: Clone omnibase_compat
        run: |
          OMNIBASE_COMPAT_SHA=$(git ls-remote https://github.com/OmniNode-ai/omnibase_compat.git HEAD | cut -f1)
          git clone --depth=1 https://github.com/OmniNode-ai/omnibase_compat.git ../omnibase_compat
          echo "omnibase_compat pinned to: $OMNIBASE_COMPAT_SHA"
      - name: Clone omnimemory
        run: |
          OMNIMEMORY_SHA=$(git ls-remote https://github.com/OmniNode-ai/omnimemory.git HEAD | cut -f1)
          git clone --depth=1 https://github.com/OmniNode-ai/omnimemory.git ../omnimemory
          echo "omnimemory pinned to: $OMNIMEMORY_SHA"
      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          version: "latest"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run golden_chain_sweep workflow E2E
        run: |
          STATE_ROOT=$(mktemp -d)
          if uv run onex run golden_chain_sweep_workflow.yaml \
            --backend event_bus=inmemory \
            --state-root "$STATE_ROOT" \
            --timeout 60 \
            --verbose; then
            EXIT=0
          else
            EXIT=$?
          fi
          echo "--- workflow_result.json ---"
          if [ -f "$STATE_ROOT/workflow_result.json" ]; then
            cat "$STATE_ROOT/workflow_result.json"
            if python3 -c "import json,sys; d=json.load(open('$STATE_ROOT/workflow_result.json')); sys.exit(0 if d.get('result')=='completed' else 1)"; then
              EVIDENCE=0
            else
              EVIDENCE=$?
            fi
          else
            EVIDENCE=1
          fi
          if [ $EXIT -ne 0 ] || [ $EVIDENCE -ne 0 ]; then
            echo "::error::E2E workflow run failed: exit=$EXIT evidence_check=$EVIDENCE"
            exit 1
          fi
          echo "E2E PASSED: terminal event received, evidence written, exit=0"
  # ============================================================================
  # GOLDEN CHAIN SUITE
  # Runs all 1,000+ golden chain tests (EventBusInmemory, zero infra) on every PR.
  # These are the platform's canonical correctness proof:
  #   - FSM state machines (build loop, close-out, observe, full modes)
  #   - Event pub/sub field-level assertions through EventBusInmemory
  #   - Handler round-trips: publish -> subscribe -> validate field values
  #   - Circuit breaker, metrics accumulation, mode branching
  # Separate from the main test job so it shows as its own required gate.
  # ============================================================================

  golden-chains:
    name: Golden Chain Suite (inmemory bus)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone omnibase_core
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_core.git ../omnibase_core
      - name: Clone omnibase_compat
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_compat.git ../omnibase_compat
      - name: Clone omnimemory
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnimemory.git ../omnimemory
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run golden chain suite
        run: |
          uv run pytest             tests/test_golden_chain_*.py             tests/unit/nodes/test_golden_chain_*.py             tests/nodes/*/test_golden_chain_*.py             -v --tb=short -q -m "not kafka"             --junit-xml=golden-chain-results.xml
      - name: Upload golden chain results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-chain-results
          path: golden-chain-results.xml

  # ============================================================================
  # GATE AGGREGATOR
  # Required status check for branch protection and merge queue.
  # ============================================================================

  contract-compliance:
    name: Contract Compliance Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - name: Checkout onex_change_control
        uses: actions/checkout@v6
        with:
          repository: OmniNode-ai/onex_change_control
          path: onex_change_control

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: 'onex_change_control/uv.lock'

      - name: Install onex_change_control
        working-directory: onex_change_control
        run: uv sync --all-extras

      - name: Validate contract YAML files
        working-directory: onex_change_control
        run: |
          CONTRACTS=$(find "$GITHUB_WORKSPACE/onex_change_control/contracts" -name "OMN-*.yaml" 2>/dev/null)
          if [ -z "$CONTRACTS" ]; then
            echo "No contract YAML files found — skipping validation"
            exit 0
          fi
          uv run validate-yaml $CONTRACTS
        env:
          GH_TOKEN: ${{ github.token }}

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, topic-naming-lint, runtime-sweep, contract-compliance, e2e-workflow-runner, golden-chains]
    if: always()
    steps:
      - name: Check CI results
        run: |
          echo "=== CI Summary ==="
          FAILED=false

          for check in \
            "lint=${{ needs.lint.result }}" \
            "typecheck=${{ needs.typecheck.result }}" \
            "test=${{ needs.test.result }}" \
            "topic-naming-lint=${{ needs.topic-naming-lint.result }}" \
            "runtime-sweep=${{ needs.runtime-sweep.result }}" \
            "contract-compliance=${{ needs.contract-compliance.result }}" \
            "e2e-workflow-runner=${{ needs.e2e-workflow-runner.result }}" \
            "golden-chains=${{ needs.golden-chains.result }}"; do
            NAME="${check%%=*}"
            RESULT="${check##*=}"
            if [ "$RESULT" != "success" ] && [ "$RESULT" != "skipped" ]; then
              echo "::error::$NAME failed (result: $RESULT)"
              FAILED=true
            else
              echo "$NAME: $RESULT"
            fi
          done

          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "CI Summary FAILED"
            exit 1
          fi
          echo ""
          echo "CI Summary PASSED"
