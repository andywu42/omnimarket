name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone omnibase_core
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_core.git ../omnibase_core
      - name: Clone omnibase_compat
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_compat.git ../omnibase_compat
      - name: Clone omnimemory
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnimemory.git ../omnimemory
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Ruff check
        run: uv run ruff check src/ tests/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/
      - name: Stub implementation check
        run: python ../omnibase_core/scripts/validation/check_stub_implementations.py src/
      - name: TODO format check
        run: |
          pip install onex-change-control 2>/dev/null || pip install ../onex_change_control 2>/dev/null || true
          # Inline check: all TODO/FIXME/HACK must have (OMN-XXXX) ticket reference
          find src/ -name '*.py' -not -path '*/tests/*' | while read -r f; do
            grep -nE '#.*\b(TODO|FIXME|HACK)\b' "$f" 2>/dev/null | grep -vE '\b(TODO|FIXME|HACK)\(OMN-[0-9]+\)' | while read -r line; do
              echo "::error file=${f}::${line} -- bare TODO/FIXME/HACK without ticket reference (use: # TODO(OMN-XXXX): description)"
              echo "FAIL" > /tmp/todo_check_failed
            done
          done
          if [ -f /tmp/todo_check_failed ]; then exit 1; fi
      # NOTE: This step requires PR #75 (OMN-7922, fix legacy contracts) to be merged
      # before it is active in CI. The build_loop_orchestrator handler still contains
      # hardcoded onex.evt.* constants until OMN-7922 migrates them to contract-declared
      # topics. This lint was added in OMN-7921 (branched from PR #76 / OMN-7918).
      - name: Topic-literal guardrail
        run: python scripts/lint_no_hardcoded_topics.py

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone omnibase_core
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_core.git ../omnibase_core
      - name: Clone omnibase_compat
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_compat.git ../omnibase_compat
      - name: Clone omnimemory
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnimemory.git ../omnimemory
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Mypy strict
        run: uv run mypy src/omnimarket/ --strict

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone omnibase_core
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_core.git ../omnibase_core
      - name: Clone omnibase_compat
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_compat.git ../omnibase_compat
      - name: Clone omnimemory
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnimemory.git ../omnimemory
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Pytest
        run: uv run pytest tests/ -v --tb=short

  # ============================================================================
  # GATE AGGREGATOR
  # Required status check for branch protection and merge queue.
  # ============================================================================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    if: always()
    steps:
      - name: Check CI results
        run: |
          echo "=== CI Summary ==="
          FAILED=false

          for check in \
            "lint=${{ needs.lint.result }}" \
            "typecheck=${{ needs.typecheck.result }}" \
            "test=${{ needs.test.result }}"; do
            NAME="${check%%=*}"
            RESULT="${check##*=}"
            if [ "$RESULT" != "success" ] && [ "$RESULT" != "skipped" ]; then
              echo "::error::$NAME failed (result: $RESULT)"
              FAILED=true
            else
              echo "$NAME: $RESULT"
            fi
          done

          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "CI Summary FAILED"
            exit 1
          fi
          echo ""
          echo "CI Summary PASSED"
