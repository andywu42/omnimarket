---
# ONEX Pre-commit Configuration — omnimarket
#
# Hooks:
#   - ruff format + lint (auto-fix)
#   - Stub implementation detection (from omnibase_core)
#   - TODO format enforcement (from onex_change_control)
#   - Hardcoded topic string prevention (from onex_change_control)
#
# Usage:
#   pre-commit install
#   pre-commit run --all-files

repos:
  # Stub implementation detection — sourced from omnibase_core (OMN-5599)
  - repo: https://github.com/OmniNode-ai/omnibase_core
    rev: 458f44ef24564956c6430ae7671570aed035c853 # pragma: allowlist secret
    hooks:
      - id: check-stub-implementations

  # Shared ONEX governance hooks (onex_change_control)
  - repo: https://github.com/OmniNode-ai/onex_change_control
    rev: 8d7e85bc00e7f1b1306d1cb40949be1ab6e7e91a  # pragma: allowlist secret
    hooks:
      - id: no-hardcoded-topics
        stages: [pre-commit]
        exclude: "^(src/omnimarket/nodes/node_emit_daemon/registries/claude_code\\.yaml|scripts/lint_no_hardcoded_topics\\.py|src/omnimarket/logging/structured_logger\\.py|src/omnimarket/nodes/node_.*/handlers/handler_.*\\.py|src/omnimarket/nodes/node_.*/handlers/overseer_tick\\.py|src/omnimarket/nodes/node_.*/models/model_.*\\.py|src/omnimarket/nodes/node_.*/__main__\\.py)$"
      - id: no-untracked-todos
        stages: [pre-commit]

  # Essential file formatting
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]

  # Topic naming lint — producer-segment allowlist (OMN-8507)
  # Requires omnibase_infra at $OMNIBASE_INFRA_PATH or ../omnibase_infra.
  - repo: local
    hooks:
      - id: topic-naming-lint
        name: Topic Naming Lint
        language: system
        entry: bash scripts/validation/run_topic_lint.sh
        pass_filenames: false
        stages: [pre-commit]

      # OMN-8611: entry-point format check (fast, triggers on pyproject.toml changes)
      # Validates that all [project.entry-points."onex.nodes"] entries are valid
      # dotted module paths. Does not verify filesystem — CI runtime_sweep does that.
      - id: entry-point-format
        name: Entry point format check
        language: system
        entry: python scripts/ci/check_entry_point_format.py
        files: ^pyproject\.toml$
        pass_filenames: true
        stages: [pre-commit]

  # Ruff — standalone pre-commit hooks (no uv source resolution needed)
  # Using astral-sh/ruff-pre-commit avoids `uv run ruff` which fails in worktrees
  # because uv.sources relative paths (../omnibase_core) resolve against the worktree
  # parent directory instead of $OMNI_HOME. (OMN-8103)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff-format
        args: [src/, tests/]
        pass_filenames: false

      - id: ruff
        alias: ruff-fix
        name: ruff check (auto-fix)
        args: [--fix, --exit-non-zero-on-fix, src/, tests/]
        pass_filenames: false

  - repo: local
    hooks:
      - id: normalization-symmetry
        name: normalization-symmetry
        entry: uv run python -m omnibase_core.validation.checker_normalization_symmetry
        language: system
        pass_filenames: false

# Configuration
default_install_hook_types: [pre-commit]
default_stages: [pre-commit]
fail_fast: false
