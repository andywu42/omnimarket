# model_policy.yaml — OmniNode model tier policy declarations
#
# All LLM endpoint URLs are resolved at runtime from environment variables.
# No hardcoded IPs or hostnames. Absent env var = RuntimeError at startup.
#
# Tier values: local | cloud | cloud_glm | cloud_google | cloud_openai
# env_var: environment variable name that must be set to an OpenAI-compatible base URL

policies:
  coder:
    tier: local
    fallback_tier: cloud
    env_var: LLM_CODER_URL
    model_id: default
    max_tokens: 4096
    context_window: 64000
    timeout_seconds: 120.0
    description: "Qwen3-Coder-30B — primary local code generation backend"

  coder_fast:
    tier: local
    fallback_tier: cloud
    env_var: LLM_CODER_FAST_URL
    model_id: default
    max_tokens: 2048
    context_window: 40000
    timeout_seconds: 60.0
    description: "Qwen3-14B — fast local model for classification and simple tasks"

  judge:
    tier: local
    fallback_tier: cloud
    env_var: LLM_DEEPSEEK_R1_URL
    model_id: deepseek-r1
    max_tokens: 4096
    context_window: 32000
    timeout_seconds: 90.0
    description: "DeepSeek-R1 — reasoning specialist for PR review verification"

  delegation:
    tier: cloud_glm
    env_var: LLM_GLM_URL
    api_key_env_var: LLM_GLM_API_KEY
    model_id_env_var: LLM_GLM_MODEL_NAME
    model_id_default: glm-4.5
    max_tokens: 8192
    context_window: 128000
    timeout_seconds: 120.0
    description: "GLM-4.5 — primary frontier code generation backend (Zhipu API)"

  delegation_review:
    tier: cloud_glm
    env_var: LLM_GLM_URL
    api_key_env_var: LLM_GLM_API_KEY
    model_id: glm-4.7-flash
    max_tokens: 2048
    context_window: 203000
    timeout_seconds: 30.0
    description: "GLM-4.7-Flash — cheap frontier code reviewer"

  embedding:
    tier: cloud
    env_var: LLM_EMBEDDING_URL
    model_id: text-embedding-3-small
    description: "Embedding model for semantic search and retrieval"
