---
name: aislop_sweep
contract_version: {major: 1, minor: 0, patch: 0}
node_type: compute
node_version: {major: 1, minor: 0, patch: 0}

description: >
  Detect AI-generated quality anti-patterns across repos. Scans for phantom callables,
  backwards-compat shims, prohibited env var patterns, hardcoded topic strings,
  agent-left TODO/FIXME markers, and empty implementations.

handler:
  module: omnimarket.nodes.node_aislop_sweep.handlers.handler_aislop_sweep
  class: NodeAislopSweep
  input_model: omnimarket.nodes.node_aislop_sweep.handlers.handler_aislop_sweep.AislopSweepRequest

descriptor:
  node_archetype: compute
  purity: pure
  idempotent: true
  timeout_ms: 120000

inputs:
  repos:
    type: list[str]
    description: "List of repository paths to scan"
    required: true
  dry_run:
    type: bool
    description: "If true, report findings without creating tickets"
    required: false
    default: false

outputs:
  findings:
    type: list[SweepFinding]
    description: "List of detected anti-pattern findings"
  summary:
    type: object
    description: "Aggregated summary with counts by severity and check type"

terminal_event: onex.evt.omnimarket.aislop-sweep-completed.v1

event_bus:
  subscribe_topics:
    - onex.cmd.omnimarket.aislop-sweep-start.v1
  publish_topics:
    - onex.evt.omnimarket.aislop-sweep-finding.v1
    - onex.evt.omnimarket.aislop-sweep-completed.v1
    - onex.evt.omnimarket.sweep-result.v1
