name: node_coverage_sweep
version: "1.0.0"
description: "Measure test coverage across Python repos and flag modules below threshold"
omnibase_core_compat: ">=0.39.0,<1.0.0"
entry_points:
  onex.nodes:
    node_coverage_sweep: "omnimarket.nodes.node_coverage_sweep"
capabilities:
  standalone: true
  full_runtime: true
  requires_network: false
  requires_repo: true
  requires_secrets: false
  requires_docker: false
  side_effect_class: read_only
dependencies:
  - "omnibase_core>=0.39.0"
authors: ["OmniNode Platform Team"]
license: "MIT"
tags: ["sweep", "coverage", "testing", "quality"]
pack: "compliance"
display_name: "Coverage Sweep"
node_role: "inventory"
