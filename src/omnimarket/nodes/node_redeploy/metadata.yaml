name: node_redeploy
version: "1.0.0"
description: "Full post-release runtime redeploy — syncs bare clone, rebuilds services, restarts containers"
omnibase_core_compat: ">=0.39.0,<1.0.0"
entry_points:
  onex.nodes:
    node_redeploy: "omnimarket.nodes.node_redeploy"
capabilities:
  standalone: true
  full_runtime: true
  requires_network: true
  requires_repo: true
  requires_secrets: false
  requires_docker: true
  side_effect_class: external_io
dependencies:
  - "omnibase_core>=0.39.0"
authors: ["OmniNode Platform Team"]
license: "MIT"
tags: ["release", "deploy", "docker", "runtime"]
pack: "release"
display_name: "Redeploy"
node_role: "effect"
