---
name: node_redeploy
contract_version: {major: 1, minor: 1, patch: 0}
node_type: effect
node_version: {major: 1, minor: 1, patch: 0}

description: >
  Triggers a deploy agent rebuild by publishing to the deploy agent command topic
  and polling for the matching completion event. Pure Kafka publish-monitor pattern.
  The deploy agent on .201 owns the actual rebuild steps.

handler:
  module: omnimarket.nodes.node_redeploy.handlers.handler_redeploy_kafka
  class: HandlerRedeployKafka
  input_model: omnimarket.nodes.node_redeploy.models.model_deploy_agent_events.ModelDeployRebuildCommand

descriptor:
  node_archetype: effect
  purity: impure
  idempotent: false
  timeout_ms: 660000

inputs:
  scope:
    type: str
    description: "Rebuild scope: full | runtime | core"
    required: false
    default: "full"
  git_ref:
    type: str
    description: "Git ref for deploy agent to pull"
    required: false
    default: "origin/main"
  services:
    type: list
    description: "Optional service filter. Empty = scope default."
    required: false
  requested_by:
    type: str
    description: "Identity label emitted in the command"
    required: false
    default: "node_redeploy"

outputs:
  success:
    type: bool
    description: "True if deploy agent reported success"
  status:
    type: str
    description: "success | failed"
  duration_seconds:
    type: float
    description: "Total build duration from deploy agent"
  git_sha:
    type: str
    description: "Git SHA that was deployed"
  services_restarted:
    type: list
    description: "Services restarted by deploy agent"
  phase_results:
    type: object
    description: "Per-phase result map (git, core, runtime, verification, publish)"
  errors:
    type: list
    description: "Per-phase error messages"
  timed_out:
    type: bool
    description: "True if polling timed out before completion event arrived"

terminal_event: onex.evt.deploy.rebuild-completed.v1

event_bus:
  # Topics this node talks to (deploy agent's topics, not omnimarket topics)
  publish_topics:
    - onex.cmd.deploy.rebuild-requested.v1
  subscribe_topics:
    - onex.evt.deploy.rebuild-completed.v1
