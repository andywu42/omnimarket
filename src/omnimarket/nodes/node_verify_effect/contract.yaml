---
name: verify_effect
contract_version: {major: 1, minor: 0, patch: 0}
node_type: effect
node_version: {major: 1, minor: 0, patch: 0}

description: >
  Verifies system health before building: dashboard, runtime, data flow.
  Non-critical failures produce warnings; only critical check failures
  block the loop. Exposes ProtocolHealthChecker for pluggable check
  implementations.

handler:
  module: omnimarket.nodes.node_verify_effect.handlers.handler_verify
  class: HandlerVerify
  input_model: omnimarket.nodes.node_verify_effect.models.model_verify_input.ModelVerifyInput

descriptor:
  node_archetype: effect
  purity: side_effect
  idempotent: true
  timeout_ms: 60000

terminal_event: onex.evt.omnimarket.build-loop-verify-completed.v1

event_bus:
  subscribe_topics:
    - onex.cmd.omnimarket.build-loop-verify.v1
  publish_topics:
    - onex.evt.omnimarket.build-loop-verify-completed.v1
