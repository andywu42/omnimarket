name: node_ci_watch
version: "1.0.0"
description: "CI watch — polls GitHub Actions for a PR, classifies terminal state, emits completion event"
omnibase_core_compat: ">=0.39.0,<1.0.0"
entry_points:
  onex.nodes:
    node_ci_watch: "omnimarket.nodes.node_ci_watch"
capabilities:
  standalone: true
  full_runtime: true
  requires_network: true
  requires_repo: true
  requires_secrets: true
  requires_docker: false
  side_effect_class: read-only
dependencies:
  - "omnibase_core>=0.39.0"
authors: ["OmniNode Platform Team"]
license: "MIT"
tags: ["ci", "github-actions", "polling", "pr", "watch"]
pack: "ci_lifecycle"
display_name: "CI Watch"
node_role: "probe"
