name: node_emit_daemon
version: "1.0.0"
description: "Portable event publishing daemon with pluggable registry and Kafka publisher"
omnibase_core_compat: ">=0.39.0,<1.0.0"
entry_points:
  onex.nodes:
    node_emit_daemon: "omnimarket.nodes.node_emit_daemon"
