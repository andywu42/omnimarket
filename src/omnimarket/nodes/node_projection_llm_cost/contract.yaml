---
name: projection_llm_cost
contract_version: {major: 1, minor: 0, patch: 0}
node_type: reducer
node_version: {major: 1, minor: 0, patch: 0}
description: >
  Projects llm-call-completed events into the llm_cost_aggregates table.
  SOW WARN blocker — cost tracking must be operational for budget compliance.
  Source topic: onex.evt.omniintelligence.llm-call-completed.v1.

handler:
  module: omnimarket.nodes.node_projection_llm_cost.handlers.handler_projection_llm_cost
  class: HandlerProjectionLlmCost

terminal_event: onex.evt.omnimarket.projection-llm-cost-applied.v1

# Golden path: llm_cost chain (llm-call-completed -> llm_cost_aggregates table)
golden_path:
  - "Consume llm-call-completed event from onex.evt.omniintelligence.llm-call-completed.v1"
  - "Projection handler upserts row into llm_cost_aggregates table"
  - "Dedup by call_id (UPSERT semantics)"
  - "Emit projection-applied event to onex.evt.omnimarket.projection-llm-cost-applied.v1"
  - "Verify row exists with model_name, total_tokens, estimated_cost_usd fields"
  - "Golden chain test: omnimarket/tests/test_golden_chain_projection_llm_cost.py"

db_io:
  db_tables:
    - name: llm_cost_aggregates
      migration: "0003_llm_cost_aggregates.sql"
      access: write
      database: omnidash_analytics
      role: aggregates

event_bus:
  subscribe_topics:
    - onex.evt.omniintelligence.llm-call-completed.v1
  publish_topics:
    - onex.evt.omnimarket.projection-llm-cost-applied.v1
