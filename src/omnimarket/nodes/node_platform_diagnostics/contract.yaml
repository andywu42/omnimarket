---
name: platform_diagnostics
contract_version: {major: 1, minor: 0, patch: 0}
node_type: orchestrator
node_version: {major: 1, minor: 0, patch: 0}

description: >
  Composable 7-dimension platform health check node. Runs async dimension checks
  (contract_health, golden_chain, runtime_nodes, hook_health, database_projections,
  ci_status, coverage) and aggregates into a tri-state PASS/WARN/FAIL result.

handler:
  module: omnimarket.nodes.node_platform_diagnostics.handlers.handler_platform_diagnostics
  class: HandlerPlatformDiagnostics
  input_model: omnimarket.nodes.node_platform_diagnostics.handlers.handler_platform_diagnostics.ModelDiagnosticsRequest

handler_routing:
  default_handler: handler:HandlerPlatformDiagnostics

descriptor:
  node_archetype: orchestrator
  purity: impure
  idempotent: true
  timeout_ms: 120000

terminal_event: onex.evt.omnimarket.platform-diagnostics-completed.v1

event_bus:
  subscribe_topics:
    - onex.cmd.omnimarket.platform-diagnostics-start.v1
  publish_topics:
    - onex.evt.omnimarket.platform-diagnostics-completed.v1

sub_handler_dependencies:
  - check_contract_health
  - check_golden_chain
  - check_runtime_nodes
  - check_hook_health
  - check_database_projections
  - check_ci_status
  - check_coverage
