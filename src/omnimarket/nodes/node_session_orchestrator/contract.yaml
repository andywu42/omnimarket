---
name: session_orchestrator
contract_version: {major: 1, minor: 0, patch: 0}
node_type: orchestrator
node_version: {major: 1, minor: 0, patch: 0}

description: >
  Unified session orchestrator. Three-phase control loop: health gate (Phase 1),
  RSD priority scoring (Phase 2), dispatch (Phase 3). Backed by
  node_session_orchestrator in omnimarket. Replaces /onex:overnight, /onex:autopilot,
  /onex:begin_day, /onex:handoff, /onex:crash_recovery.
  OMN-8687: Phase 2 (RSD scoring) and Phase 3 (dispatch) are now implemented.

handler:
  module: omnimarket.nodes.node_session_orchestrator.handlers.handler_session_orchestrator
  class: HandlerSessionOrchestrator
  input_model: omnimarket.nodes.node_session_orchestrator.handlers.handler_session_orchestrator.ModelSessionOrchestratorCommand

descriptor:
  node_archetype: orchestrator
  purity: impure
  idempotent: false
  # 8 sequential probes x ~15s each = up to 120s before orchestrator logic runs.
  # Raised to 300s to accommodate slow SSH timeouts + orchestrator overhead.
  timeout_ms: 300000

inputs:
  correlation_id:
    type: uuid
    required: true
    description: "Propagated correlation chain: sess-id.disp-id.ticket-id.pr-id"
  session_id:
    type: str
    required: false
    description: "sess-{date}-{time} identifier. Auto-generated if not provided."
  mode:
    type: str
    required: false
    default: "interactive"
    enum: [interactive, autonomous]
    description: "Execution mode. interactive awaits user approval after Phase 1."
  dry_run:
    type: bool
    required: false
    default: false
    description: "Print plan without dispatching workers."
  skip_health:
    type: bool
    required: false
    default: false
    description: "Skip Phase 1 health gate. Emergency use only."
  standing_orders_path:
    type: str
    required: false
    default: ".onex_state/session/standing_orders.json"
  state_dir:
    type: str
    required: false
    default: ".onex_state/session"
  phase:
    type: int
    required: false
    default: 0
    description: "Run only a specific phase (1/2/3). 0 = all phases."

outputs:
  session_id:
    type: str
  correlation_id:
    type: str
    description: "Propagated correlation chain, same as input or derived from session_id."
  status:
    type: str
    enum: [complete, halted, error]
  halt_reason:
    type: str
    description: "Phase and reason that caused halt, or empty string on complete."
  health_report:
    type: object
    description: >
      ModelSessionHealthReport -- one ModelHealthDimensionResult per dimension.
      Fields: session_id, dimensions[], overall_status, gate_decision, produced_at.
  dispatch_queue:
    type: list
    description: >
      Ordered list of work item IDs (Phase 2 RSD output). Empty in Phase 1-only run.
      TODO(OMN-8367): Type as list[ModelRSDQueueItem] once Phase 2 is implemented.
  dispatch_receipts:
    type: list
    description: >
      Receipts for dispatched items (Phase 3 output). Empty in stub.
      TODO(OMN-8367): Type as list[ModelDispatchReceipt] once Phase 3 is implemented.
  dry_run:
    type: bool

dod_evidence:
  phase_1:
    description: "Phase 1 health gate evidence"
    artifacts:
      - path: "{state_dir}/last_health.yaml"
        description: "Health snapshot written after each Phase 1 run (gate decision + per-dimension status)"
      - path: "src/omnimarket/nodes/node_session_orchestrator/tests/test_handler_session_orchestrator.py"
        description: "Unit + integration tests covering gate logic, RED/YELLOW/GREEN paths, exception handling"
    gate_decision_values: [PROCEED, FIX_ONLY]
    blocking_dimensions: [golden_chain, runtime_health, deploy_agent]
  phase_2:
    description: "Phase 2 RSD scoring"
    artifacts:
      - path: "{state_dir}/rsd-scored-{timestamp}.yaml"
        description: "RSD-scored ticket queue written after each Phase 2 run"
      - path: "src/omnimarket/nodes/node_session_orchestrator/tests/test_handler_session_orchestrator.py"
        description: "Unit tests covering RSD scoring, standing orders, empty Linear response"
    status: implemented
  phase_3:
    description: "Phase 3 dispatch"
    artifacts:
      - path: "{state_dir}/in_flight.yaml"
        description: "In-flight dispatch state written before dispatching"
      - path: "{state_dir}/ledger.jsonl"
        description: "One JSON line appended per completed session"
      - path: "src/omnimarket/nodes/node_session_orchestrator/tests/test_handler_session_orchestrator.py"
        description: "Unit tests covering dispatch with dry_run, empty queue, receipt format"
    status: implemented

env_requirements:
  required:
    - name: ONEX_INFRA_HOST
      description: "Hostname/IP of infra server (SSH probes for runtime_health, deploy_agent, observability)"
    - name: ONEX_INFRA_USER
      description: "SSH username for infra server"
  optional:
    - name: OMNI_HOME
      description: "Path to canonical omni_home registry (golden_chain + repo_sync probes)"
    - name: LINEAR_API_KEY
      description: "Linear API key (linear_sync probe)"

event_bus:
  subscribe_topics:
    - onex.cmd.omnimarket.session-orchestrator-start.v1
  publish_topics:
    - onex.evt.omnimarket.session-orchestrator-completed.v1
    - onex.evt.omnimarket.session-health-transition.v1

terminal_event: onex.evt.omnimarket.session-orchestrator-completed.v1

# Health gate dimensions (Phase 1)
health_dimensions:
  - id: 1
    name: pr_inventory
    description: "Any PR blocked on RED CI with no owner"
    blocks_dispatch_on_red: false
    blocks_dispatch_on_yellow: false

  - id: 2
    name: golden_chain
    description: "Any golden chain failure in omnimarket skills"
    blocks_dispatch_on_red: true
    blocks_dispatch_on_yellow: true

  - id: 3
    name: linear_sync
    description: "Ticket status vs actual PR state mismatch count > 0"
    blocks_dispatch_on_red: false
    blocks_dispatch_on_yellow: false

  - id: 4
    name: runtime_health
    description: "Container down or port unreachable on infra server"
    blocks_dispatch_on_red: true
    blocks_dispatch_on_yellow: true

  - id: 5
    name: plugin_currency
    description: "Plugin version behind or skill count mismatch"
    blocks_dispatch_on_red: false
    blocks_dispatch_on_yellow: false

  - id: 6
    name: deploy_agent
    description: "systemd deploy-agent.service inactive or not subscribed"
    blocks_dispatch_on_red: true
    blocks_dispatch_on_yellow: true

  - id: 7
    name: observability
    description: "No events from any consumer in >10 min"
    blocks_dispatch_on_red: false
    blocks_dispatch_on_yellow: false

  - id: 8
    name: repo_sync
    description: "Any canonical repo behind origin/main"
    blocks_dispatch_on_red: false
    blocks_dispatch_on_yellow: false
