---
name: build_loop
contract_version: {major: 1, minor: 0, patch: 0}
node_type: compute
node_version: {major: 1, minor: 0, patch: 0}

description: >
  Deterministic build loop WorkflowPackage. Coordinates the 6-phase autonomous
  build loop cycle as a pure FSM state machine. Phases: IDLE -> CLOSING_OUT ->
  VERIFYING -> FILLING -> CLASSIFYING -> BUILDING -> COMPLETE.
  Circuit breaker trips after 3 consecutive failures.

handler:
  module: omnimarket.nodes.node_build_loop.handlers.handler_build_loop
  class: HandlerBuildLoop
  input_model: omnimarket.nodes.node_build_loop.models.model_loop_start_command.ModelLoopStartCommand

descriptor:
  node_archetype: compute
  purity: pure
  idempotent: true
  timeout_ms: 300000

inputs:
  correlation_id:
    type: uuid
    description: "Unique cycle ID"
    required: true
  max_cycles:
    type: int
    description: "Maximum number of build loop cycles to run"
    required: false
    default: 1
  skip_closeout:
    type: bool
    description: "Skip the CLOSING_OUT phase"
    required: false
    default: false
  dry_run:
    type: bool
    description: "Run without side effects"
    required: false
    default: false

outputs:
  final_phase:
    type: str
    description: "Terminal phase reached (complete or failed)"
  cycles_completed:
    type: int
    description: "Number of cycles that completed successfully"
  total_tickets_dispatched:
    type: int
    description: "Total tickets dispatched across all cycles"

terminal_event: onex.evt.omnimarket.build-loop-completed.v1

event_bus:
  subscribe_topics:
    - onex.cmd.omnimarket.build-loop-start.v1
  publish_topics:
    - onex.evt.omnimarket.build-loop-phase-transition.v1
    - onex.evt.omnimarket.build-loop-completed.v1
