name: node_merge_sweep
version: "1.0.0"
description: "Org-wide PR sweep — enables GitHub auto-merge on ready PRs and polishes fixable PRs"
omnibase_core_compat: ">=0.39.0,<1.0.0"
entry_points:
  onex.nodes:
    node_merge_sweep: "omnimarket.nodes.node_merge_sweep"
capabilities:
