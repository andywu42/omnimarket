  full_runtime: true
  requires_network: true
  requires_repo: true
  requires_secrets: true
  requires_docker: false
  side_effect_class: mutating
dependencies:
  - "omnibase_core>=0.39.0"
authors: ["OmniNode Platform Team"]
license: "MIT"
tags: ["sweep", "pr", "merge", "github", "pipeline"]
