---
name: merge_sweep
contract_version: {major: 1, minor: 1, patch: 0}
node_type: orchestrator
node_version: {major: 1, minor: 1, patch: 0}

description: >
  Org-wide PR sweep. Classifies open PRs into merge-ready (Track A),
  thread-resolution (Track A-resolve), and needs-polish (Track B) queues.
  Enables GitHub auto-merge on ready PRs, resolves review threads, and
  dispatches polish work on fixable PRs. Tracks cross-run failure history
  with escalation thresholds (STUCK, CHRONIC, RECIDIVIST).

handler_routing:
  default_handler: handler:NodeMergeSweep

descriptor:
  node_archetype: orchestrator
  purity: impure
  idempotent: true
  timeout_ms: 300000

event_bus:
  subscribe_topics:
    - onex.cmd.omnimarket.merge-sweep-start.v1
  publish_topics:
    - onex.evt.omnimarket.merge-sweep-completed.v1
