---
name: local_review
contract_version: {major: 1, minor: 0, patch: 0}
node_type: compute
node_version: {major: 1, minor: 0, patch: 0}

description: >
  Iterative local code review loop WorkflowPackage. Phases: INIT -> REVIEW ->
  FIX -> COMMIT -> CHECK_CLEAN -> DONE. Loops back from CHECK_CLEAN to REVIEW
  when issues remain. Requires N consecutive clean runs before completing.
  Circuit breaker trips after 3 consecutive failures.

handler:
  module: omnimarket.nodes.node_local_review.handlers.handler_local_review
  class: HandlerLocalReview
  input_model: omnimarket.nodes.node_local_review.models.model_local_review_start_command.ModelLocalReviewStartCommand

descriptor:
  node_archetype: compute
  purity: pure
  idempotent: true
  timeout_ms: 300000

inputs:
  max_iterations:
    type: int
    description: "Maximum review-fix cycles"
    required: false
    default: 10
  required_clean_runs:
    type: int
    description: "Consecutive clean runs required"
    required: false
    default: 2
  dry_run:
    type: bool
    description: "Run without side effects"
    required: false
    default: false

outputs:
  final_phase:
    type: str
    description: "Terminal phase reached"
  iteration_count:
    type: int
    description: "Number of review iterations"
  issues_found:
    type: int
    description: "Total issues found"
  issues_fixed:
    type: int
    description: "Total issues fixed"

terminal_event: onex.evt.omnimarket.local-review-completed.v1

event_bus:
  subscribe_topics:
    - onex.cmd.omnimarket.local-review-start.v1
  publish_topics:
    - onex.evt.omnimarket.local-review-phase-transition.v1
    - onex.evt.omnimarket.local-review-completed.v1
