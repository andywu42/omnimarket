---
name: ModelStallRecoveryCommand
fields:
  ticket_id:
    type: str
    description: "Linear ticket ID (e.g., OMN-1234)"
    required: true
  agent_id:
    type: str
    description: "Agent/task ID to monitor/recover"
    required: true
  timeout_minutes:
    type: int
    description: "Minutes of inactivity before stall detection"
    default: 2
    minimum: 1
    maximum: 60
  context_threshold_pct:
    type: int
    description: "Context usage % that triggers preemptive recovery (0 = disabled)"
    default: 80
    minimum: 0
    maximum: 100
  max_redispatches:
    type: int
    description: "Max redispatch attempts before escalation"
    default: 2
    minimum: 1
    maximum: 10
  dry_run:
    type: bool
    description: "If true, check health without taking action"
    default: false
