# ONEX Node Contract - Merge Sweep Auto-Merge Arm Effect (OMN-8960)
name: node_merge_sweep_auto_merge_arm_effect
contract_version: {major: 1, minor: 0, patch: 0}
node_type: effect
node_version: {major: 1, minor: 0, patch: 0}

description: >
  Arms GitHub auto-merge via GraphQL enablePullRequestAutoMerge (SQUASH strategy).
  Serial-in-handler execution per Phase 1 audit. Idempotent: re-arming an already-armed
  PR returns success. NEVER calls gh pr merge --auto; always uses GraphQL mutation.

handler:
  module: omnimarket.nodes.node_merge_sweep_auto_merge_arm_effect.handlers.handler_auto_merge_arm
  class: HandlerAutoMergeArmEffect
  input_model: omnimarket.nodes.node_merge_sweep_triage_orchestrator.models.model_triage_request.ModelAutoMergeArmCommand

handler_routing:
  default_handler: omnimarket.nodes.node_merge_sweep_auto_merge_arm_effect.handlers.handler_auto_merge_arm:HandlerAutoMergeArmEffect

descriptor:
  node_archetype: effect
  purity: impure
  idempotent: true
  timeout_ms: 15000

event_bus:
  consumer_group: omnimarket.merge_sweep_auto_merge_arm_effect.consume.v1
  subscribe_topics:
    - onex.cmd.omnimarket.pr-auto-merge-arm.v1
  publish_topics:
    - onex.evt.omnimarket.pr-auto-merge-armed.v1
  dlq_topics:
    - onex.dlq.omnimarket.pr-auto-merge-arm.v1
