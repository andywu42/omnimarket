name: node_pipeline_fill
version: "1.0.0"
description: "RSD-driven pipeline fill orchestrator — queries Linear, scores tickets, dispatches to ticket-pipeline (OMN-8688)"
omnibase_core_compat: ">=0.39.0,<1.0.0"
entry_points:
  onex.nodes:
    node_pipeline_fill: "omnimarket.nodes.node_pipeline_fill"
capabilities:
  standalone: false
  full_runtime: true
  requires_network: true
  requires_repo: false
  requires_secrets: true
  requires_docker: false
  side_effect_class: mutating
dependencies:
  - "omnibase_core>=0.39.0"
  - "omnibase_compat"
  - "pyyaml>=6.0"
authors: ["OmniNode Platform Team"]
license: "MIT"
tags: ["orchestrator", "pipeline-fill", "rsd", "build-loop", "linear", "dispatch"]
pack: "build_loop"
display_name: "Pipeline Fill Orchestrator"
node_role: "orchestrator"
