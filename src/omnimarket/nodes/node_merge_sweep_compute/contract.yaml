---
name: merge_sweep_compute
contract_version: {major: 2, minor: 0, patch: 0}
node_type: compute
node_version: {major: 2, minor: 0, patch: 0}

description: >
  Org-wide PR sweep. Classifies open PRs into merge-ready (Track A),
  thread-resolution (Track A-resolve), and needs-polish (Track B) queues.
  Enables GitHub auto-merge on ready PRs, resolves review threads, and
  dispatches polish work on fixable PRs. Tracks cross-run failure history
  with escalation thresholds (STUCK, CHRONIC, RECIDIVIST).

handler:
  module: omnimarket.nodes.node_merge_sweep_compute.handlers.handler_merge_sweep
  class: NodeMergeSweep
  input_model: omnimarket.nodes.node_merge_sweep_compute.handlers.handler_merge_sweep.ModelMergeSweepRequest

handler_routing:
  default_handler: handler:NodeMergeSweep

descriptor:
  node_archetype: compute
  purity: pure
  idempotent: true
  timeout_ms: 5000

terminal_event: onex.evt.omnimarket.merge-sweep-completed.v1

event_bus:
  consumer_group: omnimarket.merge_sweep.consume.v1
  subscribe_topics:
    - onex.cmd.omnimarket.merge-sweep-start.v1
  publish_topics:
    - onex.evt.omnimarket.merge-sweep-completed.v1
  dlq_topics:
    - onex.dlq.omnimarket.merge-sweep.v1
