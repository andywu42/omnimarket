[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "omnimarket"
version = "0.1.0"
description = "OmniMarket - Portable ONEX workflow package registry"
authors = [
    {name = "OmniNode.ai", email = "contact@omninode.ai"}
]
license = { text = "MIT" }
readme = "README.md"
requires-python = ">=3.12"
keywords = [
    "onex",
    "marketplace",
    "workflow",
    "portable",
    "contract",
    "event-driven",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3 :: Only",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Typing :: Typed",
]
dependencies = [
    "omnibase_core>=0.39.0",
    "pydantic>=2.12.5,<3.0.0",
    "pyyaml>=6.0.2,<7.0.0",
]

[project.urls]
Homepage = "https://github.com/OmniNode-ai/omnimarket"
Repository = "https://github.com/OmniNode-ai/omnimarket"

[project.entry-points."onex.nodes"]
node_aislop_sweep = "omnimarket.nodes.node_aislop_sweep"
node_merge_sweep = "omnimarket.nodes.node_merge_sweep"
node_platform_readiness = "omnimarket.nodes.node_platform_readiness"

[tool.uv.sources]
omnibase-core = { path = "../omnibase_core", editable = true }

[tool.hatch.build.targets.wheel]
packages = ["src/omnimarket"]

[tool.hatch.build]
artifacts = ["src/omnimarket/**/*.yaml"]

[dependency-groups]
dev = [
    "pytest>=8.4.0",
    "pytest-asyncio>=1.3.0",
    "ruff>=0.14.13,<0.16.0",
    "mypy>=1.19.1",
    "types-pyyaml>=6.0.12.20250822",
]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "RUF"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "."]
asyncio_mode = "auto"
markers = [
    "unit: Unit tests that test individual components in isolation",
    "integration: Integration tests that test multiple components together",
]
