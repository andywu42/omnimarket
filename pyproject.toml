[tool.uv.sources]
omnibase-compat = { git = "https://github.com/OmniNode-ai/omnibase_compat.git", branch = "main" }
omnibase-spi = { git = "https://github.com/OmniNode-ai/omnibase_spi.git", branch = "main" }
omninode-memory = { git = "https://github.com/OmniNode-ai/omnimemory.git", branch = "main" }
onex-change-control = { git = "https://github.com/OmniNode-ai/onex_change_control.git", branch = "main" }

[tool.hatch.build.targets.wheel]
packages = ["src/omnimarket"]

[tool.hatch.build]
artifacts = ["src/omnimarket/**/*.yaml"]

[dependency-groups]
dev = [
    "pytest>=8.4.0",
    "pytest-asyncio>=1.3.0",
    "ruff>=0.14.13,<0.16.0",
    "mypy>=1.19.1",
    "types-pyyaml>=6.0.12.20250822",
]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM", "RUF", "C4", "T20", "PT", "ARG", "SLF", "RET"]
ignore = [
    "E501",      # Line too long (will fix incrementally)
    "ARG001",    # Unused function argument
    "ARG002",    # Unused method argument
    "RET504",    # Unnecessary assign before return
    "RUF012",    # Mutable class default (ClassVar annotation)
    "SIM103",    # Needless bool return
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["T201", "SLF001"]
"scripts/**/*.py" = ["T201"]

[tool.mypy]
strict = true
plugins = ["pydantic.mypy"]
python_version = "3.12"
mypy_path = "src"
namespace_packages = true
explicit_package_bases = true

[[tool.mypy.overrides]]
module = "omnibase_compat.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "omnibase_infra.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "onex_change_control.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "omnimemory.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["asyncpg", "asyncpg.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["aiokafka", "aiokafka.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "omnimarket.nodes.node_navigation_history_reducer.node_navigation_history_reducer"
ignore_errors = true

[[tool.mypy.overrides]]
module = "omnimarket.nodes.node_pr_review_bot.adapter_github_bridge"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["radon", "radon.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "omnimarket.nodes.node_pr_lifecycle_inventory_compute.*",
    "omnimarket.nodes.node_pr_lifecycle_triage_compute.*",
    "omnimarket.nodes.node_pr_lifecycle_state_reducer.*",
    "omnimarket.nodes.node_pr_lifecycle_merge_effect.*",
    "omnimarket.nodes.node_pr_lifecycle_fix_effect.*",
]
ignore_missing_imports = true

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = false
warn_required_dynamic_aliases = true
warn_untyped_fields = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "."]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
markers = [
    "unit: Unit tests that test individual components in isolation",
    "integration: Integration tests that test multiple components together",
    "slow: Tests that take a long time to run (>1s)",
    "kafka: marks tests requiring a running Kafka broker",
]
